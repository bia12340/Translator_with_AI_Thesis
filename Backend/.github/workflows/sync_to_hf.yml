name: Sync to Hugging Face Hub
on:
  push:
    branches: [main] 
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true 

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://Bia12340:$HF_TOKEN@huggingface.co/spaces/Bia12340/AI-Translator-Backend main
